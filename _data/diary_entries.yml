- id: "D-21"
  date: "2026-03-05 20:36"
  status: "recovered"
  corrupted: false
  highlight: false
  body: |-
    我把今天拍的照片又看了一遍，现场确实没有东西。这个结论本身没问题，白天能看见的就是普通林地、坡面、裸岩和杂草，照片也能证明这一点。按正常流程，这件事到这里就应该结束，正文里补一句“现场复核未发现异常，初步判断为 AI 增强造成的纹理误判”就够了。

    但问题是，我现在越来越不相信“现场没有东西”这句话能解释全部情况。它只能解释白天。它不能解释为什么原始影像卡在那个时间窗，不能解释 anonymous 那条评论的时间，不能解释用户9920416为什么知道路线，也不能解释我站在现场时那种奇怪的空白感。白天的林子很正常，正常得像是特意拿来证明它正常。

    我知道这句话听起来不对。我也知道自己现在有点被这件事带进去了。下午回来的时候我还在笑自己，觉得为了一个模型误判跑一趟山里很蠢。可是晚上打开后台以后，我发现自己一直在搜索同几个词：时间窗、路线、最近可达点、03:04、基站。最后这个词是我随手打的，不知道为什么会打它。

    没有结果，或者说没有我能理解的结果。先记下来。今晚不能再看了。

- id: "D-20"
  date: "2026-03-05 16:18"
  status: "recovered"
  corrupted: false
  highlight: false
  body: |-
    白天复核结束，现场没发现异常。最近可达点能看到一部分坡面，和影像位置大概能对上。实际环境就是西南山地里很普通的林地，树不算特别密，坡面有裸岩，地表有灌草和碎石，局部阴影确实比较复杂。站在现场看，完全没有什么眼状结构，也没有人为设施，更没有任何能写进正文的特殊现象。

    我拍了几张方位照片，回去可以作为补充材料。现在比较合理的解释还是 AI 超分辨率把林地、裸岩和坡面阴影混合纹理补坏了。模型在这种场景里确实容易过度重建，尤其是低照度影像，本来就不该过度相信细节。严格说，这次应该算一个挺典型的误判案例。

    不过有点失落。昨晚看到那张增强图的时候，我是真的以为可能抓到了什么有意思的东西。不是怪力乱神那种有意思，是研究上的有意思。比如复杂喀斯特坡面夜间影像纹理异常，或者低照度条件下地表结构增强偏差。现在看来，八成还是模型问题。

    评论区那边我晚点回复。先把照片整理一下，正文里加一句现场情况。应该到此为止了。

- id: "D-19"
  date: "2026-03-05 11:42"
  status: "recovered"
  corrupted: false
  highlight: false
  body: |-
    用户9920416又留言了，说白天去看只能证明白天没问题，要复核就应该按原始观测时间去。这个话单独看确实没错，但放在这个事情里就很怪。正常人不会建议别人凌晨再去山里看一眼，尤其是为了一个大概率由模型造成的纹理异常。

    他还给我发了路线。路线比我自己查的细很多，甚至写到了哪里停车、哪段路步行、哪里可能没信号。我问他是不是去过，他没回。账号也查不到历史记录，头像空白，资料空白，像是临时冒出来的。

    我本来不想理，但路线确实有用。白天去最近可达点看一眼问题不大，不进核心区，也不做危险动作，只拍几张照片。如果现场就是普通林地，那这件事可以彻底收掉。严格地说，这也算补一个地面验证，虽然样本只有一个点，意义不大，但至少能让评论区闭嘴。

    先去白天复核。晚上绝对不去。这句话写下来，免得自己犯蠢。

- id: "D-18"
  date: "2026-03-04 23:27"
  status: "recovered"
  corrupted: false
  highlight: false
  body: |-
    今天基本都在处理那块区域。我把它单独标出来了，免得后面跟其他结果混在一起。这个区域现在还是不好判断，公开底图上看就是林地和裸岩混合坡面，没什么特别的。原始影像里它也不明显，只是一块边界有点怪的低亮区域，真正让我不舒服的是增强以后，那里的纹理会变得很集中。

    我换了几个增强方法，结果都不够干净。细节会变，边缘会变，纹理强弱也会变，但那块区域总会留下一点类似方向的结构。它不像真目标，也不像纯噪声。最烦就是这种东西，不够当证据，又不够直接删掉。

    评论区已经开始跑偏了。anonymous 那条“他们在注视你”我看见了，时间显示 03:04。我不知道是不是页面排序 bug。先不删，删了反而显得我在意。其实我确实在意。这个时间出现得太巧了。

- id: "D-17"
  date: "2026-03-04 02:56"
  status: "recovered"
  corrupted: false
  highlight: false
  body: |-
    刚才看到一块不太对的区域。先简单记录一下，明天再重新看。原始图里它只是一个低亮的混合纹理区，边界不算特别清楚，但放大后很怪，尤其是靠坡面阴影那一侧，纹理不像正常裸岩，也不像树冠。

    我第一反应还是数据问题。可能是薄云，可能是坡面阴影，可能是配准误差，也可能是模型把低质量纹理补坏了。夜间影像本来就脏，喀斯特山区地形又碎，裸岩、灌木、阴影混在一起，什么奇怪形态都可能出现。

    但我承认，我有点兴奋。要是真能从这里挖出一个稳定的异常纹理模式，哪怕最后证明只是模型偏差，也能写点东西。现在的问题是，我还不知道它到底是“值得研究的错误”，还是“我熬夜熬出来的错觉”。

    先备份一下结果。明天重跑一遍。不要半夜下判断。

- id: "D-16"
  date: "2026-03-03 23:46"
  status: "recovered"
  corrupted: false
  highlight: false
  body: |-
    这几天一直盯着那批卫星数据，结果什么都没有。不是发现不了异常，是连报错都没有，流程跑得很顺，顺到让人烦。按理说顺利应该高兴，但这种“没有异常、没有问题、没有结论”的状态最折磨人。图像一景一景翻过去，山还是山，林子还是林子，裸岩还是裸岩，最多就是云层和阴影恶心一点。

    下午做喵过来找我调试她那个小工具，说是地图加载有点问题，让我帮她看一下。我本来只想花十分钟，结果一折腾就是一下午。主要也不是多难，就是前端显示和后端路径对不上，点位能出来，底图不跟着动。她在旁边一直说“很快很快”，我就知道肯定快不了。

    忙完回到自己电脑前，监测程序已经报错了。不是大错，像是中间某个缓存断了，重新跑就行。我懒得一点点查，直接重启了监测。重启以后定位好像有点偏，原来对得上的几个点往旁边滑了一点。实在不想修了，先放着，明天再重新配准。

    结果晚上随手看了一眼，偏移后的那一版反而把一块区域凸出来了。我第一反应是配准错了，所以没敢往下想。可那块东西的位置有点怪，不像单纯滑出来的误差。先不管，明天清醒以后再看。今天已经够烦了。

- id: "D-15"
  date: "2026-03-01 22:18"
  status: "recovered"
  corrupted: false
  highlight: false
  body: |-
    学校又要统计学生个人信息。每次都是差不多那些东西，表格换个名字再填一遍，最后还要反复核对。上次就有人填错，老师在群里大发雷霆，语音一条接一条，隔着屏幕都能感觉到火气。

    今天帮忙核查了一小部分学生信息表，什么错误都有。最烦的是这些错误看起来都不大，但放到统计表里就很麻烦，最后还是要一个一个改，一个一个问。做这种事特别耗时间，而且没有成就感。改完一轮还得再检查一轮，生怕哪里又漏了。

    我现在看表格看得头疼。晚上本来想继续处理影像，打开电脑以后半天没动。感觉今天一天都在跟各种格式错误较劲，不是在改学生信息，就是在改数据路径。

    明天再跑模型。今天先到这。

- id: "D-14"
  date: "2026-02-27 00:31"
  status: "recovered"
  corrupted: false
  highlight: false
  body: |-
    今天主要还是处理影像。云太多，尤其是山地边缘那几景，薄云、坡面阴影和裸岩亮度混在一起，自动掩膜经常乱判。上午跑出来一版看着还行，下午抽查才发现有些地方被误删了，只能重跑。最烦的是这种问题不明显，整体看没事，放大以后才发现边界不对。

    超分模型也不太稳定。树冠边缘经常被补得太硬，裸岩纹理会被拉成重复图案，看起来像某种结构，其实大概率是模型自己编的。我现在对这类东西已经有点免疫了，第一反应不是“发现异常”，而是“又来了”。

    晚上又扫了一遍白天没处理完的几景，还是没什么特别值得留的。山地影像本来就麻烦，角度、湿度、云层、阴影都会影响纹理，很多东西看上去像规律，其实换个参数就散了。

    这周要是还没结果，就先把这批数据放一放。一直盯着同一批图，人真的会开始自己骗自己。

- id: "D-13"
  date: "2026-02-26 22:52"
  status: "recovered"
  corrupted: false
  highlight: false
  body: |-
    今天没干什么特别的事。上午整理了一下前几个月的影像目录，把几个命名不规范的文件改了，不然脚本老是读错。下午跑了一遍预处理，投影没问题，分辨率也对，主要还是缺数据和云太多。山地就是这样，图看着多，真正能用的没几张。

    吃饭的时候想了一下最近的进度，感觉有点空。每天都在对齐、裁剪、重采样、剔除异常值，最后得到的结论往往是“没有异常”。这其实也算结果，但写出来没意思。别人看论文只看发现了什么，很少有人关心你排除了多少错误。

    晚上本来想早点睡，结果又把几景影像打开看了一遍。没什么东西。最多就是坡面阴影有点复杂，裸岩区亮度跳得厉害。以前我还会对这种纹理多看几眼，现在基本直接标成低可信。

    明天继续跑模型。希望电脑别再突然蓝屏。

- id: "D-12"
  date: "2026-02-24 23:08"
  status: "recovered"
  corrupted: false
  highlight: false
  body: |-
    今天基本都在等程序跑。上午提交了一批预处理任务，中间卡过一次，不知道是路径问题还是临时文件没清干净，重启以后又能跑了。现在这些脚本就是这样，报错的时候烦，不报错的时候也烦，因为你不知道它是真的没问题，还是问题还没暴露出来。

    下午把几个区域的结果粗略看了一下，没有特别突出的地方。大部分变化都能解释，不是云，就是阴影，要么就是地形影响。说实话，这种结果最难写，不能说没做事，但也确实没什么能拿出来讲的。

    最近有点疲劳。每天盯着图层、坐标、掩膜和输出表，看久了以后什么都像异常，又什么都不像异常。以前觉得发现问题最难，现在觉得确认“没有问题”也挺折磨人的。

    先这样吧。明天把剩下几景补完，再看要不要换一批数据。

