{% include base_path %}

<!-- start custom head snippets -->

<!-- Use the personal rabbit avatar as the site icon. The version query refreshes old favicon caches. -->
<link rel="apple-touch-icon" href="{{ base_path }}/images/profile.jpg?v=rabbit-20260627"/>
<link rel="icon" type="image/jpeg" href="{{ base_path }}/images/profile.jpg?v=rabbit-20260627"/>
<link rel="shortcut icon" type="image/jpeg" href="{{ base_path }}/images/profile.jpg?v=rabbit-20260627"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json?v=rabbit-20260627"/>
<meta name="theme-color" content="#e9bf8a"/>
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>
{% if page.arg_page or page.article_id == "001" %}
<link rel="stylesheet" href="{{ '/assets/css/arg.css' | relative_url }}"/>
{% endif %}
{% if page.arg_admin_page %}
<link rel="stylesheet" href="{{ '/assets/css/arg-admin.css' | relative_url }}"/>
{% endif %}
{% if page.arg_console %}
<link rel="stylesheet" href="{{ '/assets/css/arg-console.css' | relative_url }}"/>
{% endif %}
{% if page.arg_console == "relay" or page.arg_console == "relay-ending" %}
<link rel="stylesheet" href="{{ '/assets/css/relay-console.css' | relative_url }}"/>
{% endif %}
{% if page.noindex %}
<meta name="robots" content="noindex, nofollow, noarchive"/>
{% endif %}


<!-- Support for MatJax -->
<script src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- end custom head snippets -->
