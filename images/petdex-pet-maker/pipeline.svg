<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Petdex Pet Maker pipeline</title>
  <desc id="desc">A reference image becomes one coherent spritesheet, passes validation, and is packaged as a desktop pet.</desc>
  <rect width="1200" height="360" fill="#f6f8fb"/>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <g transform="translate(45 95)">
      <rect width="240" height="170" rx="8" fill="#ffffff" stroke="#202937" stroke-width="3"/>
      <circle cx="120" cy="64" r="34" fill="#ffd166" stroke="#202937" stroke-width="3"/>
      <path d="M72 132c16-34 80-34 96 0" fill="none" stroke="#202937" stroke-width="8" stroke-linecap="round"/>
      <text x="120" y="154" font-size="24" fill="#202937">Reference image</text>
    </g>
    <path d="M310 180h70" stroke="#5a6472" stroke-width="5" marker-end="url(#arrow)"/>
    <g transform="translate(405 55)">
      <rect width="300" height="250" rx="8" fill="#ffffff" stroke="#202937" stroke-width="3"/>
      <g fill="#77c4b4" stroke="#202937" stroke-width="1">
        <rect x="25" y="25" width="29" height="22"/><rect x="57" y="25" width="29" height="22"/><rect x="89" y="25" width="29" height="22"/><rect x="121" y="25" width="29" height="22"/><rect x="153" y="25" width="29" height="22"/><rect x="185" y="25" width="29" height="22"/><rect x="217" y="25" width="29" height="22"/><rect x="249" y="25" width="29" height="22"/>
      </g>
      <g fill="none" stroke="#5d3fbf" stroke-width="4">
        <path d="M40 72q28-24 56 0t56 0t56 0t56 0"/>
        <path d="M40 110q28 24 56 0t56 0t56 0t56 0"/>
        <path d="M40 148q28-24 56 0t56 0t56 0t56 0"/>
      </g>
      <text x="150" y="214" font-size="24" fill="#202937">One 8 x 9 sheet</text>
    </g>
    <path d="M730 180h70" stroke="#5a6472" stroke-width="5" marker-end="url(#arrow)"/>
    <g transform="translate(825 95)">
      <rect width="330" height="170" rx="8" fill="#ffffff" stroke="#202937" stroke-width="3"/>
      <path d="M54 81l28 28 55-63" fill="none" stroke="#2d9d78" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="220" y="72" font-size="24" fill="#202937">Validate</text>
      <text x="220" y="108" font-size="24" fill="#202937">Package</text>
      <text x="220" y="144" font-size="24" fill="#202937">Apply locally</text>
    </g>
  </g>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0l12 6-12 6z" fill="#5a6472"/>
    </marker>
  </defs>
</svg>
